# Planar annulus with geometric clustering toward the inner radius.
project:
  name: annulus

surfaces:
  ring:
    preset: annulus
    radius_inner: 0.5
    radius_outer: 2.0
    points: {i: 129, j: 33}
    spacing:
      j: {kind: geometric, ratio: 1.08}

output:
  directory: output
  vtm: true
  plot3d: true
  quality_report: true
